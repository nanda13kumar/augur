# nginx serves the built SPA and proxies /api to the backend container.
# BACKEND_HOST / BACKEND_PORT are substituted at container start (see Dockerfile).
server {
    listen       ${FRONTEND_PORT};
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    # SPA routing — always fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy — the frontend only ever calls relative /api, nginx routes it
    # to the backend service. This is why the backend port is fully
    # configurable without touching the frontend bundle.
    location /api/ {
        proxy_pass         http://${BACKEND_HOST}:${BACKEND_PORT};
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
}
